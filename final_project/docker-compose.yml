services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tanish
      POSTGRES_PASSWORD: password
      POSTGRES_DB: langgraph
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tanish -d langgraph"]
      interval: 5s
      retries: 5

  billing-mcp-server:
    build:
      context: ..
      dockerfile: final_project/mcp_server/Dockerfile
    command: ["python3", "final_project/mcp_server/billing_server.py"]
    env_file: ../.env
    ports:
      - "8081:8081"

  technical-mcp-server:
    build:
      context: ..
      dockerfile: final_project/mcp_server/Dockerfile
    command: ["python3", "final_project/mcp_server/technical_server.py"]
    env_file: ../.env
    ports:
      - "8082:8082"

  fastapi:
    build:
      context: ..
      dockerfile: final_project/Dockerfile
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      billing-mcp-server:
        condition: service_started
      technical-mcp-server:
        condition: service_started

volumes:
  postgres_data:
